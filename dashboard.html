<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JMS Shipment Tracker</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
</head>
<body>
  <div class="app-layout">
    <aside class="sidebar">
      <div class="sidebar-brand">
        <h2>JMS Shipment Tracker</h2>
        <p>BoomRx</p>
      </div>
      <div class="sidebar-user" id="sidebar-user"></div>
      <nav class="sidebar-nav">
        <button class="nav-item active"><svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="5" width="12" height="9" rx="1"/><path d="M5 5V3.5A1.5 1.5 0 0 1 6.5 2h3A1.5 1.5 0 0 1 11 3.5V5"/><path d="M2 8h12"/></svg> Shipments</button>
        <button class="nav-item" onclick="window.location.href='analytics.html'"><svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 16 16"><rect x="2" y="9" width="3" height="5" rx="0.5" fill="currentColor" stroke="none"/><rect x="6.5" y="6" width="3" height="8" rx="0.5" fill="currentColor" stroke="none"/><rect x="11" y="3" width="3" height="11" rx="0.5" fill="currentColor" stroke="none"/></svg> Analytics</button>
        <button class="nav-item" id="import-nav-btn" style="display:none" onclick="window.location.href='import.html'"><svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M8 2v8M5 5l3-3 3 3"/><path d="M3 11v2a1 1 0 0 0 1 1h8a1 1 0 0 0 1-1v-2"/></svg> Import Data</button>
      </nav>
      <div class="sidebar-footer">
        <button class="btn btn-outline" style="width:100%;color:rgba(255,255,255,0.7);border-color:rgba(255,255,255,0.2)" onclick="logout()">Sign Out</button>
      </div>
    </aside>
    <main class="main-content">
      <div class="page-header">
        <h1>Shipments</h1>
        <p id="page-subtitle"></p>
      </div>

      <!-- Upload Info -->
      <div id="upload-banner" style="margin-bottom:0.5rem"></div>

      <!-- KPI Strip -->
      <div class="kpi-strip" id="kpi-strip"></div>

      <!-- Date Range Pills -->
      <div class="filters-bar" style="margin-bottom:0.5rem">
        <div class="filter-pills" id="date-pills">
          <button class="pill" data-range="today">Today</button>
          <button class="pill" data-range="yesterday">Yesterday</button>
          <button class="pill" data-range="last7">Last 7 Days</button>
          <button class="pill active" data-range="last30">Last 30 Days</button>
          <button class="pill" data-range="last90">Last 90 Days</button>
          <button class="pill" data-range="all">All Time</button>
        </div>
      </div>

      <!-- Filters -->
      <div class="filters-bar">
        <div class="filter-pills" id="filter-pills">
          <button class="pill active" data-status="all">All</button>
          <button class="pill" data-status="received">Received</button>
          <button class="pill" data-status="shipped">Shipped</button>
          <button class="pill" data-status="cancelled">Cancelled</button>
        </div>
        <input type="text" class="search-input" id="search-input" placeholder="Search clinic, drug, invoice…">
        <span id="search-hint" style="display:none;font-size:0.75rem;color:var(--text-muted);white-space:nowrap">Searching all dates</span>
        <select class="rep-filter" id="rep-filter" style="display:none">
          <option value="">All Reps</option>
        </select>
        <select class="rep-filter" id="am-filter" style="display:none">
          <option value="">All Account Managers</option>
        </select>
      </div>

      <!-- Table -->
      <div class="table-card">
        <div class="table-wrapper">
          <table>
            <thead id="table-head"></thead>
            <tbody id="table-body">
              <tr><td colspan="10" style="text-align:center;padding:2rem;color:var(--gray)">Loading…</td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </main>
  </div>

  <script src="lib/bcryptjs.min.js"></script>
  <script>window.bcrypt = window.bcrypt || (window.dcodeIO && window.dcodeIO.bcrypt);</script>
  <script src="lib/xlsx.min.js"></script>
  <script src="app.js"></script>
  <script>
    let allShipments = [];
    let shipmentData = null;
    let assignments = {};
    let currentUser = null;
    let currentFilter = { status: 'all', search: '', repFilter: '', amFilter: '', dateRange: 'last30' };
    let searchTimer = null;

    async function init() {
      currentUser = checkAuth();
      if (!currentUser) return;

      const elevated = isElevatedRole(currentUser.role);

      document.getElementById('sidebar-user').innerHTML =
        '<strong>' + currentUser.name + '</strong>' +
        '<span style="font-size:0.75rem;opacity:0.7;text-transform:capitalize">' + currentUser.role.replace('_', ' ') + '</span>' +
        currentUser.email;

      document.getElementById('page-subtitle').textContent = elevated ? 'All rep shipments' : 'Your assigned shipments';

      if (canWrite(currentUser.role)) document.getElementById('import-nav-btn').style.display = '';

      // Table header
      document.getElementById('table-head').innerHTML = '<tr>' +
        '<th>Status</th>' +
        (elevated ? '<th>Rep</th>' : '') +
        '<th>Clinic</th><th>Region</th><th>Order Date</th><th>Ship Date</th><th>Pharmacy</th><th>Order ID</th><th>Tracking</th>' +
        '</tr>';

      try {
        const [config, data, assigns] = await Promise.all([loadConfig(), loadShipments(), loadAssignments()]);
        shipmentData = data;
        assignments = assigns;

        let shipments = data.shipments || [];
        if (!elevated) shipments = shipments.filter(s => s.rep_name === currentUser.name);
        allShipments = shipments;

        if (elevated) {
          const repFilter = document.getElementById('rep-filter');
          repFilter.style.display = '';
          const reps = [...new Set(shipments.map(s => s.rep_name).filter(Boolean))].sort();
          reps.forEach(r => { const o = document.createElement('option'); o.value = r; o.textContent = r; repFilter.appendChild(o); });
          repFilter.addEventListener('change', () => { currentFilter.repFilter = repFilter.value; applyFilters(); });

          const amFilter = document.getElementById('am-filter');
          amFilter.style.display = '';
          const amNames = [...new Set(Object.values(assigns).map(v => v.account_manager).filter(Boolean))].sort();
          amNames.forEach(am => { const o = document.createElement('option'); o.value = am; o.textContent = am; amFilter.appendChild(o); });
          const uOpt = document.createElement('option'); uOpt.value = '__unassigned__'; uOpt.textContent = 'Unassigned'; amFilter.appendChild(uOpt);
          if (currentUser.role === 'account_manager') {
            const match = [...amFilter.options].find(o => o.value === currentUser.name);
            if (match) { amFilter.value = currentUser.name; currentFilter.amFilter = currentUser.name; }
          }
          amFilter.addEventListener('change', () => { currentFilter.amFilter = amFilter.value; applyFilters(); });
        }

        applyFilters();
      } catch (err) {
        document.getElementById('table-body').innerHTML = '<tr><td colspan="10" style="text-align:center;padding:2rem;color:var(--red)">Error loading data: ' + err.message + '</td></tr>';
      }
    }

    function applyFilters() {
      const filtered = filterShipments(allShipments, currentFilter, assignments);
      renderUploadBanner('upload-banner', shipmentData);
      renderKPI(filtered, 'kpi-strip');
      const elevated = isElevatedRole(currentUser.role);
      renderTable(filtered, 'table-body', elevated, shipmentData.last_updated, shipmentData.updated_by, assignments);
    }

    document.getElementById('filter-pills').addEventListener('click', e => {
      const pill = e.target.closest('.pill');
      if (!pill) return;
      document.querySelectorAll('#filter-pills .pill').forEach(p => p.classList.remove('active'));
      pill.classList.add('active');
      currentFilter.status = pill.dataset.status;
      applyFilters();
    });

    document.getElementById('date-pills').addEventListener('click', e => {
      const pill = e.target.closest('.pill');
      if (!pill) return;
      document.querySelectorAll('#date-pills .pill').forEach(p => p.classList.remove('active'));
      pill.classList.add('active');
      currentFilter.dateRange = pill.dataset.range;
      applyFilters();
    });

    document.getElementById('search-input').addEventListener('input', e => {
      clearTimeout(searchTimer);
      const val = e.target.value;
      const hint = document.getElementById('search-hint');
      if (hint) hint.style.display = val ? '' : 'none';
      searchTimer = setTimeout(() => {
        currentFilter.search = val;
        applyFilters();
      }, 300);
    });

    init();
  </script>
</body>
</html>
